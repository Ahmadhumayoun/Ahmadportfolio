<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  padding:40px;
}

h1{text-align:center;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:30px;
}

th, td{
  padding:12px;
  border:1px solid #444;
  text-align:left;
}

th{
  background:#d4af37;
  color:#000;
}

tr:hover{
  background:#1e293b;
}
</style>
</head>
<body>

<h1>Products</h1>

<table id="productTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Price</th>
      <th>Description</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
fetch('products.csv')
.then(response => response.text())
.then(data => {
  const rows = data.split('\\n').slice(1);
  const table = document.querySelector('#productTable tbody');

  rows.forEach(row => {
    const cols = row.split(',');
    if(cols.length >= 3){
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${cols[0]}</td>
        <td>${cols[1]}</td>
        <td>${cols[2]}</td>
      `;
      table.appendChild(tr);
    }
  });
});
</script>

</body>
</html>
